<text x="400" y="424" font-family="Arial Black,sans-serif" font-size="15" font-weight="900" fill="#1a2a3a" text-anchor="middle" letter-spacing="1">SP-SQUEEGEE-S</text>
<!-- corner badges -->
<rect x="166" y="136" width="60" height="24" rx="3" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
<text x="196" y="152" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#c9a84c" text-anchor="middle" letter-spacing="1">OEM</text>
<rect x="574" y="136" width="60" height="24" rx="3" fill="rgba(26,42,58,0.06)" stroke="rgba(26,42,58,0.2)" stroke-width="1"/>
<text x="604" y="152" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#1a2a3a" text-anchor="middle" letter-spacing="1">CE</text>
<text x="400" y="590" font-family="Arial,sans-serif" font-size="9" fill="rgba(26,42,58,0.18)" text-anchor="middle" letter-spacing="1">© CLEANPRO COMMERCIAL CLEANING EQUIPMENT — SP-SQUEEGEE-S</text>
