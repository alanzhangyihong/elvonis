  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#f0d98a"/>
  </linearGradient>
</defs>
<rect width="800" height="600" fill="url(#bg)"/>
<!-- center card -->
<rect x="150" y="120" width="500" height="360" rx="12" fill="white" stroke="#dce4ed" stroke-width="1.5"/>
<rect x="150" y="120" width="500" height="7" rx="2" fill="url(#gold)"/>
