<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" width="1400" height="600">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#0f1e2b"/><stop offset="100%" stop-color="#1a2a3a"/>
  </linearGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#f0d98a"/>
  </linearGradient>
  <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#243547"/><stop offset="100%" stop-color="#1a2a3a"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.028)" stroke-width="1"/>
  </pattern>
</defs>
<rect width="1400" height="600" fill="url(#bg)"/>
<rect width="1400" height="600" fill="url(#grid)"/>
<!-- Gold left accent bar -->
<rect x="0" y="80" width="3" height="440" fill="url(#gold)" rx="2" opacity="0.8"/>
