<line x1="0" y1="0" x2="0" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="60" y1="0" x2="60" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="120" y1="0" x2="120" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="180" y1="0" x2="180" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="300" y1="0" x2="300" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="360" y1="0" x2="360" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="420" y1="0" x2="420" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="540" y1="0" x2="540" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="600" y1="0" x2="600" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="660" y1="0" x2="660" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="780" y1="0" x2="780" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="840" y1="0" x2="840" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><line x1="900" y1="0" x2="900" y2="500" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
