<style>
/* ── Unified about section structure ── */
.about-block {
  padding: 56px 0;
  border-bottom: 1px solid var(--silver-dark);
}
.about-block:last-child { border-bottom: none; }

/* Every block: same tag + title combo */
.about-tag {
  font-size: 10px; font-weight: 600;
  color: var(--cyan); letter-spacing: .12em;
  text-transform: uppercase; margin-bottom: 10px;
}
.about-h2 {
  font-family: var(--font-d);
  font-size: clamp(20px, 2.5vw, 26px);
  font-weight: 700; color: var(--navy);
  margin-bottom: 24px; line-height: 1.2;
}

/* Story */
.about-quote {
  border-left: 3px solid var(--cyan);
  padding: 14px 20px;
  background: var(--silver);
  border-radius: 0 6px 6px 0;
  margin-bottom: 24px;
}
.about-quote p {
  font-size: 15px; font-weight: 600;
  color: var(--navy); line-height: 1.6; margin: 0;
}
.about-body p {
  font-size: 13px; color: var(--text-muted);
  line-height: 1.9; margin-bottom: 12px;
}
.about-body p:last-child { margin-bottom: 0; }

/* Stats — uniform with value cards */
.about-stats {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 14px; margin-top: 36px;
}
.about-stat {
  padding: 22px 16px; text-align: center;
  background: var(--white);
  border: 0.5px solid var(--silver-dark);
  border-top: 3px solid var(--cyan);
  border-radius: 8px;
}
.about-stat-num {
  font-family: var(--font-d); font-size: 28px;
  font-weight: 700; color: var(--cyan); line-height: 1;
}
.about-stat-label {
  font-size: 11px; color: var(--text-muted);
  margin-top: 6px; letter-spacing: .02em;
}

/* Mission */
.about-mission-text {
  font-size: 14px; color: var(--text-mid);
  line-height: 1.9; max-width: 680px;
  padding: 22px 26px;
  background: var(--silver);
  border-left: 3px solid var(--cyan);
  border-radius: 0 6px 6px 0;
}

/* Values — same card style as stats */
.about-values {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 14px;
}
.about-value {
  padding: 22px 20px;
  background: var(--white);
  border: 0.5px solid var(--silver-dark);
  border-top: 3px solid var(--cyan);
  border-radius: 8px;
}
.about-value-num {
  font-family: var(--font-d); font-size: 22px;
  font-weight: 700; color: var(--cyan); margin-bottom: 10px;
}
.about-value-title {
  font-size: 13px; font-weight: 600;
  color: var(--navy); margin-bottom: 8px;
}
.about-value-desc {
  font-size: 12px; color: var(--text-muted); line-height: 1.7;
}

/* Products — same card style */
.about-products {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 14px;
}
.about-product {
  padding: 22px 20px;
  background: var(--white);
  border: 0.5px solid var(--silver-dark);
  border-top: 3px solid var(--cyan);
  border-radius: 8px; cursor: pointer;
  transition: box-shadow .2s, transform .2s;
}
.about-product:hover {
  box-shadow: 0 6px 20px rgba(0,174,239,.12);
  transform: translateY(-2px);
}
.about-product-name {
  font-size: 13px; font-weight: 600;
  color: var(--navy); margin-bottom: 8px;
}
.about-product-desc {
  font-size: 11px; color: var(--text-muted); line-height: 1.6;
}

@media(max-width:960px){
  .about-stats,.about-values,.about-products { grid-template-columns: repeat(2,1fr); }
}
@media(max-width:560px){
  .about-values,.about-products { grid-template-columns: 1fr; }
}
.about-logo-title {
  font-family: 'Raleway', var(--font-d), sans-serif !important;
  font-size: clamp(36px, 6vw, 60px) !important;
  font-weight: 600 !important;
  letter-spacing: 0.28em !important;
  text-transform: uppercase !important;
}
</style>

<script>
const PROD_CATS = [
  { zh:'高压清洗机',      en:'High-Pressure Washers',
    zh_sub:'100–500bar · 冷热水 · 电动/汽油/柴油 · CE认证',
    en_sub:'100–500 bar · Cold & Hot · Electric/Petrol/Diesel · CE' },
  { zh:'工业吸尘器',      en:'Industrial Vacuums',
    zh_sub:'干湿两用 · HEPA H14 · 防静电 · 防爆 · CE认证',
    en_sub:'Dry/Wet · HEPA H14 · Anti-Static · Explosion-Proof · CE' },
  { zh:'商用洗地机',      en:'Floor Scrubbers',
    zh_sub:'手推式和驾驶式 · 最大120cm · 锂电 · CE认证',
    en_sub:'Walk-behind & Ride-on · Up to 120cm · Battery · CE' },
  { zh:'商用扫地机器人',  en:'Robotic Sweepers',
    zh_sub:'激光雷达导航 · 自动回充 · App控制 · 7×24运行',
    en_sub:'LiDAR Navigation · Auto-Charge · App Control · 7×24h' },
];

function renderPage() {
  const zh = currentLang === 'zh';
  document.getElementById('valTitle').textContent  = zh ? '我们的价值观' : 'Our Values';
  document.getElementById('prodTitle').textContent = zh ? '四大核心产品系列' : 'Our Product Range';
  document.getElementById('stat-c').textContent    = zh ? '已覆盖国家' : 'Countries';
  document.getElementById('stat-ce').textContent   = zh ? '认证产品' : 'Certified';
  document.getElementById('stat-r').textContent    = zh ? '响应时间' : 'Response';
  document.getElementById('stat-moq').textContent  = zh ? '低起订量' : 'Low MOQ';

  document.getElementById('prodCoverage').innerHTML = PROD_CATS.map(c => `
    <div class="about-product" onclick="location.href='products.html'">
      <div class="about-product-name">${zh ? c.zh : c.en}</div>
      <div class="about-product-desc">${zh ? c.zh_sub : c.en_sub}</div>
    </div>`).join('');

  const el = document.getElementById('storyBody');
  if (el) {
    el.innerHTML = T('about.story').split('\n\n')
      .map(p => `<p>${p.trim()}</p>`).join('');
  }
}

function toggleMobileNav() { document.getElementById('mobileNav').classList.toggle('open'); }
function initWA() {
  const b = document.getElementById('wa-float');
  if (b) { b.href = 'https://wa.me/' + SITE_CONFIG.whatsapp + '?text=' + encodeURIComponent(T('wa.greeting')); b.title = T('wa.tooltip'); }
}
function onLangChange() { renderPage(); initWA(); }
document.addEventListener('DOMContentLoaded', () => { initWA(); renderPage(); });
</script>
