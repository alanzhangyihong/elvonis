<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="meta.about.title">ELVONIS</title>
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="style.css">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
.about-section { padding: 56px 0; border-bottom: 1px solid var(--silver-dark); }
.about-section:last-of-type { border-bottom: none; }
.about-section-inner { max-width: 720px; }
.about-quote-block {
  border-left: 4px solid var(--cyan);
  padding: 16px 22px;
  background: var(--silver);
  border-radius: 0 8px 8px 0;
  margin: 20px 0 28px;
}
.about-quote-block p {
  font-family: var(--font-d);
  font-size: 17px; font-weight: 600;
  color: var(--navy); line-height: 1.6; margin: 0;
}
.about-story-text p { font-size: 13px; color: var(--text-muted); line-height: 1.9; margin-bottom: 14px; }
.about-stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
  margin-top: 36px;
}
.about-stat {
  background: var(--silver); border-radius: 8px;
  padding: 18px; text-align: center;
  border-top: 3px solid var(--cyan);
}
.about-stat-num { font-family: var(--font-d); font-size: 28px; font-weight: 700; color: var(--cyan); }
.about-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.mission-text {
  font-size: 15px; color: var(--text-mid);
  line-height: 1.9; max-width: 680px;
  padding: 24px 28px;
  background: var(--silver);
  border-left: 4px solid var(--cyan);
  border-radius: 0 8px 8px 0;
  margin-top: 20px;
}
.values-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 20px; }
.value-item { padding: 22px 20px; background: var(--white); border: 0.5px solid var(--silver-dark); border-radius: 8px; border-top: 3px solid var(--cyan); }
.value-item-num { font-family: var(--font-d); font-size: 22px; font-weight: 700; color: var(--cyan); margin-bottom: 10px; }
.value-item-title { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
.value-item-desc { font-size: 12px; color: var(--text-muted); line-height: 1.7; }
@media(max-width:900px){
  .about-stats { grid-template-columns: repeat(2,1fr); }
  .values-row { grid-template-columns: repeat(2,1fr); }
}
@media(max-width:600px){
  .values-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">ELVONIS</a>
  <nav>
    <button class="nav-link" onclick="location.href='index.html'" data-i18n="nav.home"></button>
    <button class="nav-link" onclick="location.href='products.html'" data-i18n="nav.products"></button>
    <button class="nav-link" onclick="location.href='applications.html'" data-i18n="nav.apps"></button>
    <button class="nav-link" onclick="location.href='blog.html'" data-i18n="nav.blog"></button>
    <button class="nav-link active" onclick="location.href='about.html'" data-i18n="nav.about"></button>
    <button class="nav-link" onclick="location.href='contact.html'" data-i18n="nav.contact"></button>
  </nav>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">ZH</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <button class="btn-header" onclick="location.href='contact.html'" data-i18n="nav.inquiry">立即询价</button>
    <button class="hamburger" id="hamburger" onclick="toggleMobileNav()"><span></span><span></span><span></span></button>
  </div>
</header>
<div class="mobile-nav" id="mobileNav">
  <button class="nav-link" onclick="location.href='index.html'" data-i18n="nav.home"></button>
  <button class="nav-link" onclick="location.href='products.html'" data-i18n="nav.products"></button>
  <button class="nav-link" onclick="location.href='applications.html'" data-i18n="nav.apps"></button>
  <button class="nav-link" onclick="location.href='blog.html'" data-i18n="nav.blog"></button>
  <button class="nav-link active" onclick="location.href='about.html'" data-i18n="nav.about"></button>
  <button class="nav-link" onclick="location.href='contact.html'" data-i18n="nav.contact"></button>
  <div class="mobile-lang">
    <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">ZH</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
  <button class="btn-header" onclick="location.href='contact.html'" data-i18n="nav.inquiry">立即询价</button>
</div>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-eyebrow" data-i18n="nav.about">关于我们</div>
    <h1 class="page-hero-title">ELVONIS</h1>
    <p class="page-hero-sub" data-i18n="about.hero.sub">全球商用及工业清洁设备品牌供应商</p>
  </div>
</div>

<!-- CONTENT -->
<section class="section section-white">
  <div class="container">

    <!-- ① 我们的故事 -->
    <div class="about-section">
      <div class="about-section-inner">
        <div class="section-tag" data-i18n="about.story.title">我们的故事</div>
        <div class="about-quote-block">
          <p data-i18n="about.quote"></p>
        </div>
        <div class="about-story-text" id="storyBody"></div>
      </div>
      <!-- Stats row -->
      <div class="about-stats">
        <div class="about-stat">
          <div class="about-stat-num">50+</div>
          <div class="about-stat-label" id="stat-c">已覆盖国家</div>
        </div>
        <div class="about-stat">
          <div class="about-stat-num">CE</div>
          <div class="about-stat-label" id="stat-ce">认证产品</div>
        </div>
        <div class="about-stat">
          <div class="about-stat-num">24h</div>
          <div class="about-stat-label" id="stat-r">响应时间</div>
        </div>
        <div class="about-stat">
          <div class="about-stat-num">1pc</div>
          <div class="about-stat-label" id="stat-moq">低起订量</div>
        </div>
      </div>
    </div>

    <!-- ② 我们的使命 -->
    <div class="about-section">
      <div class="about-section-inner">
        <div class="section-tag" data-i18n="about.mission.label">我们的使命</div>
        <div class="mission-text" data-i18n="about.mission"></div>
      </div>
    </div>

    <!-- ③ 我们的价值观 -->
    <div class="about-section">
      <div class="about-section-inner">
        <div class="section-tag">VALUES</div>
        <h2 id="valTitle" style="margin-top:8px;">我们的价值观</h2>
      </div>
      <div class="values-row">
        <div class="value-item">
          <div class="value-item-num">01</div>
          <div class="value-item-title" data-i18n="about.val1.title"></div>
          <div class="value-item-desc" data-i18n="about.val1"></div>
        </div>
        <div class="value-item">
          <div class="value-item-num">02</div>
          <div class="value-item-title" data-i18n="about.val2.title"></div>
          <div class="value-item-desc" data-i18n="about.val2"></div>
        </div>
        <div class="value-item">
          <div class="value-item-num">03</div>
          <div class="value-item-title" data-i18n="about.val3.title"></div>
          <div class="value-item-desc" data-i18n="about.val3"></div>
        </div>
        <div class="value-item">
          <div class="value-item-num">04</div>
          <div class="value-item-title" data-i18n="about.val4.title"></div>
          <div class="value-item-desc" data-i18n="about.val4"></div>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- PRODUCT COVERAGE -->
<section class="section section-silver">
  <div class="container">
    <div class="section-head">
      <div class="section-tag" data-i18n="about.prod.title">四大核心产品系列</div>
      <h2 data-i18n="about.prod.title">四大核心产品系列</h2>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;" id="prodCoverage"></div>
  </div>
</section>

<!-- CTA -->
<div class="cta-band">
  <div class="cta-inner">
    <div class="cta-left">
      <h2 class="cta-title"><span data-i18n="cta.title1"></span><br><em data-i18n="cta.title2"></em></h2>
      <p class="cta-sub" data-i18n="cta.sub"></p>
    </div>
    <div class="cta-right">
      <button class="btn btn-accent" onclick="location.href='contact.html'" data-i18n="nav.inquiry">立即询价</button>
    </div>
  </div>
</div>

<div class="footer-wrap">
<footer>
  <div>
    <div class="footer-logo-wrap">
      <span class="footer-wordmark">ELVONIS</span>
    </div>
    <p class="footer-desc" data-i18n="footer.slogan"></p>
    <div class="footer-certs">
      <span class="footer-cert">CE</span>
      <span class="footer-cert">RoHS</span>
      <span class="footer-cert">OEM</span>
    </div>
  </div>
  <div>
    <div class="footer-col-title" data-i18n="footer.products">产品中心</div>
    <div class="footer-links">
      <a href="products.html?cat=pressure" data-i18n="prod.filter.pressure">高压清洗机</a>
      <a href="products.html?cat=vacuum" data-i18n="prod.filter.vacuum">工业吸尘器</a>
      <a href="products.html?cat=scrubber" data-i18n="prod.filter.scrubber">商用洗地机</a>
      <a href="products.html?cat=sweeper" data-i18n="prod.filter.sweeper">扫地机器人</a>
    </div>
  </div>
  <div>
    <div class="footer-col-title" data-i18n="footer.company">公司</div>
    <div class="footer-links">
      <a href="about.html" data-i18n="nav.about">关于我们</a>
      <a href="blog.html" data-i18n="nav.blog">知识博客</a>
      <a href="applications.html" data-i18n="nav.apps">应用场景</a>
      <a href="contact.html" data-i18n="nav.contact">联系我们</a>
    </div>
  </div>
  <div>
    <div class="footer-col-title" data-i18n="footer.support">支持</div>
    <div class="footer-links">
      <a href="contact.html">FAQ</a>
      <a href="contact.html" data-i18n="nav.inquiry">立即询价</a>
      <a href="contact.html">WhatsApp</a>
    </div>
  </div>
</footer>
</div>
<div class="footer-bottom" style="background:var(--navy-dark);">
  <p class="footer-copy" data-i18n="footer.copy"></p>
  <p class="footer-cert-row" data-i18n="footer.cert"></p>
</div>

<a id="wa-float" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
  <div class="wa-pulse"></div>
  <svg viewBox="0 0 32 32" fill="white"><path d="M16 3C9 3 3.4 8.6 3.4 15.6c0 2.3.6 4.5 1.8 6.4L3 29l7.3-2.2c1.8 1 3.8 1.6 5.8 1.6h.1C23 28.4 28.6 22.8 28.6 15.8 28.6 8.7 23 3 16 3zm6 8.1c-.3-.2-1.9-1-2.3-1.1-.4-.1-.6-.2-.9.2-.3.3-.9 1.1-1.1 1.4-.2.2-.4.3-.7.1-.3-.2-1.4-.5-2.6-1.6-1-.9-1.6-2-1.8-2.3-.2-.4 0-.5.1-.7l.6-.7c.2-.2.2-.4.4-.6.1-.2.1-.4 0-.6-.1-.2-.9-2.1-1.2-2.8-.3-.7-.6-.6-.9-.6h-.7c-.2 0-.6.1-.9.4C8 13 7.2 13.8 7.2 15.5s1.3 3.4 1.5 3.6c.2.2 2.6 4 6.3 5.6.9.4 1.5.6 2 .7.9.3 1.6.2 2.2.1.7-.1 2.1-.9 2.4-1.7.3-.8.3-1.5.2-1.7-.1-.1-.3-.2-.5-.3z"/></svg>
</a>

<script src="language.js"></script>
<script>
const PROD_CATS=[
  {zh:'高压清洗机',en:'High-Pressure Washers',zh_sub:'100–500bar · 冷热水 · 电动/汽油/柴油 · CE认证',en_sub:'100–500 bar · Cold & Hot · Electric/Petrol/Diesel · CE'},
  {zh:'工业吸尘器',en:'Industrial Vacuums',zh_sub:'干湿两用 · HEPA H14 · 防静电 · 防爆 · CE认证',en_sub:'Dry/Wet · HEPA H14 · Anti-Static · Explosion-Proof · CE'},
  {zh:'商用洗地机',en:'Floor Scrubbers',zh_sub:'手推式和驾驶式 · 最大120cm · 锂电 · CE认证',en_sub:'Walk-behind & Ride-on · Up to 120cm · Battery · CE'},
  {zh:'商用扫地机器人',en:'Robotic Sweepers',zh_sub:'激光雷达导航 · 自动回充 · App控制 · 7×24运行',en_sub:'LiDAR Navigation · Auto-Charge · App Control · 7×24h'},
];
function renderPage(){
  const zh=currentLang==='zh';
  document.getElementById('valTitle').textContent=zh?'我们的价值观':'What We Stand For';
  document.getElementById('stat-c').textContent=zh?'已覆盖国家':'Countries';
  document.getElementById('stat-ce').textContent=zh?'认证产品':'Certified';
  document.getElementById('stat-r').textContent=zh?'响应时间':'Response';
  document.getElementById('stat-moq').textContent=zh?'低起订量':'Low MOQ';
  document.getElementById('prodCoverage').innerHTML=PROD_CATS.map(c=>`
    <div style="background:var(--white);border:0.5px solid var(--silver-dark);border-radius:8px;padding:18px;border-top:3px solid var(--cyan);cursor:pointer;" onclick="location.href='products.html'">
      <div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px;">${zh?c.zh:c.en}</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.6;">${zh?c.zh_sub:c.en_sub}</div>
    </div>`).join('');
  const el=document.getElementById('storyBody');
  if(el){
    const raw=T('about.story');
    el.innerHTML=raw.split('\n\n').map(p=>`<p>${p.trim()}</p>`).join('');
  }
}
function toggleMobileNav(){document.getElementById('mobileNav').classList.toggle('open');}
function initWA(){
  const b=document.getElementById('wa-float');
  if(b){b.href='https://wa.me/'+SITE_CONFIG.whatsapp+'?text='+encodeURIComponent(T('wa.greeting'));b.title=T('wa.tooltip');}
}
function onLangChange(){renderPage();initWA();}
document.addEventListener('DOMContentLoaded',()=>{initWA();renderPage();});
</script>
<script>
if(window.netlifyIdentity){window.netlifyIdentity.on("init",user=>{if(!user){window.netlifyIdentity.on("login",()=>{document.location.href="/admin/";});}});}
</script>
</body>
</html>
