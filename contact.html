<script>
// Pre-fill from URL params
const _urlP = new URLSearchParams(location.search);
const _urlProd = _urlP.get('product');
const _urlType = _urlP.get('type');

if (_urlProd) {
  const sel = document.getElementById('productSelect');
  // Try to match existing option value
  const existing = Array.from(sel.options).find(o => o.value === _urlProd);
  if (existing) {
    existing.selected = true;
  } else {
    // Specific product name passed (from product detail page quote button)
    const opt = document.createElement('option');
    opt.value = _urlProd; opt.textContent = _urlProd; opt.selected = true;
    sel.prepend(opt);
  }
}
if (_urlType === 'consumables') {
  const typeSelect = document.getElementById('inquiryType');
  if (typeSelect) {
    const opt = typeSelect.querySelector('[value="consumables"]');
    if (opt) opt.selected = true;
  }
}

function renderPage() {
  const btn = document.getElementById('waContactBtn');
  if (btn) btn.href = 'https://wa.me/' + SITE_CONFIG.whatsapp + '?text=' + encodeURIComponent(T('wa.greeting'));
}
function onLangChange() {
  renderPage();
}
// Form submit
document.getElementById('contactForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const btn=this.querySelector('.form-submit');
  const msg=document.getElementById('formMsg');
  btn.textContent=T('contact.sending');btn.disabled=true;
  const data=Object.fromEntries(new FormData(this));
  try{
    const res=await fetch('https://formspree.io/f/'+SITE_CONFIG.formspree,{
      method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify(data)
    });
    if(res.ok){msg.textContent=T('contact.success');msg.className='form-msg success';this.reset();}
    else throw new Error();
  }catch{msg.textContent=T('contact.error');msg.className='form-msg error';}
  msg.style.display='block';
  btn.textContent=T('contact.submit');btn.disabled=false;
});
</script>
<script>
function toggleMobileNav(){document.getElementById('mobileNav').classList.toggle('open');}
function initWA(){
  const b=document.getElementById('wa-float');
  if(b){
    b.href='https://wa.me/'+SITE_CONFIG.whatsapp+'?text='+encodeURIComponent(T('wa.greeting'));
    b.title=T('wa.tooltip');
  }
}
function onLangChange(){renderPage();initWA();}
document.addEventListener('DOMContentLoaded',()=>{initWA();renderPage();});
</script>
<script>
