<style>
.scene-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;}
.scene-card{background:var(--white);border:0.5px solid var(--silver-dark,#CBD5E1);border-radius:12px;padding:32px 28px;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s;}
.scene-card:hover{box-shadow:0 12px 36px rgba(0,174,239,.12);transform:translateY(-3px);}
.scene-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cyan);transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.scene-card:hover::before{transform:scaleX(1);}
.scene-num{font-family:var(--font-d);font-size:72px;font-weight:800;color:rgba(26,42,58,.04);position:absolute;right:20px;bottom:-10px;line-height:1;pointer-events:none;}
.scene-icon{font-size:40px;margin-bottom:14px;display:block;}
.scene-title{font-family:var(--font-d);font-size:clamp(18px,2.5vw,24px);font-weight:700;color:var(--navy);margin-bottom:4px;}
.scene-sub{font-size:11px;color:var(--cyan);font-weight:600;letter-spacing:.04em;margin-bottom:12px;display:block;}
.scene-desc{font-size:13px;color:var(--text-muted);line-height:1.75;margin-bottom:18px;}
.scene-rec-label{font-size:10px;font-weight:600;color:var(--cyan);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.scene-slogan{font-size:12px;font-weight:700;color:var(--navy);background:var(--silver);border-left:3px solid var(--cyan);padding:7px 12px;border-radius:0 4px 4px 0;margin-bottom:16px;letter-spacing:.02em;}
.scene-tags{display:flex;flex-wrap:wrap;gap:6px;}
.scene-tag{background:var(--silver);border:0.5px solid var(--silver-dark,#CBD5E1);border-radius:4px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--navy);cursor:pointer;transition:all .2s;}
.scene-tag:hover{background:var(--cyan);color:#fff;border-color:var(--cyan);}
@media(max-width:760px){.scene-grid{grid-template-columns:1fr;}}
</style>

function renderPage() {
  const lang = currentLang;
  const recLabel = lang === 'zh' ? '推荐产品' : 'RECOMMENDED PRODUCTS';
  document.getElementById('sceneGrid').innerHTML = SCENES.map(s => `
    <div class="scene-card">
      <div class="scene-num">${s.num}</div>
      <span class="scene-icon">${s.icon}</span>
      <div class="scene-title">${T('app.'+s.key)}</div>
      <span class="scene-sub">${T('app.'+s.key+'.sub')}</span>
      <p class="scene-desc">${T('app.'+s.key+'.desc')}</p>
      <div class="scene-slogan">${T('app.'+s.key+'.slogan')}</div>
      <div class="scene-rec-label">${recLabel}</div>
      <div class="scene-tags">${s.recs.map(r =>
        `<span class="scene-tag" onclick="location.href='product.html?id=${r.id}'">${r[lang]}</span>`
      ).join('')}</div>
    </div>`).join('');
}

function toggleMobileNav(){document.getElementById('mobileNav').classList.toggle('open');}
function initWA(){const b=document.getElementById('wa-float');if(b){b.href='https://wa.me/'+SITE_CONFIG.whatsapp+'?text='+encodeURIComponent(T('wa.greeting'));b.title=T('wa.tooltip');}
  const sl=document.getElementById('logo-slogan');
  if(sl) sl.textContent=currentLang==='zh'?'专为清洁，专为商用':'Serious Clean for Serious Business';
}
function onLangChange(){renderPage();initWA();}
document.addEventListener('DOMContentLoaded',()=>{initWA();renderPage();});
