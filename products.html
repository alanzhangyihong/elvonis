<script>
let currentCat='all', currentQuery='';
const urlP=new URLSearchParams(location.search);
if(urlP.get('cat'))currentCat=urlP.get('cat');

function renderPage(){
  const lang=currentLang;
  let list=getProducts(currentCat,currentQuery);
  const grid=document.getElementById('productGrid');
  const noRes=document.getElementById('noResults');
  const count=document.getElementById('prodCount');
  if(list.length===0){grid.innerHTML='';noRes.style.display='block';}
  else{noRes.style.display='none';grid.innerHTML=list.map(p=>renderProductCard(p)).join('');}
  count.textContent=(lang==='zh'?T('prod.showing')+' '+list.length+' '+T('prod.items'):T('prod.showing')+' '+list.length+' '+T('prod.items'));
  document.querySelectorAll('.filter-btn').forEach(b=>{b.classList.toggle('active',b.dataset.cat===currentCat);});
}

document.querySelectorAll('.filter-btn').forEach(b=>{
  b.addEventListener('click',()=>{currentCat=b.dataset.cat||'all';renderPage();});
});
document.getElementById('searchInput').addEventListener('input',e=>{currentQuery=e.target.value.toLowerCase().trim();renderPage();});
</script>
<script>
function toggleMobileNav(){document.getElementById('mobileNav').classList.toggle('open');}
function initWA(){const b=document.getElementById('wa-float');if(b){b.href='https://wa.me/'+SITE_CONFIG.whatsapp+'?text='+encodeURIComponent(T('wa.greeting'));b.title=T('wa.tooltip');}
  const sl=document.getElementById('logo-slogan');
  if(sl) sl.textContent=currentLang==='zh'?'专为清洁，专为商用':'Serious Clean for Serious Business';
}
function onLangChange(){if(typeof renderPage==='function')renderPage();initWA();}
document.addEventListener('DOMContentLoaded',()=>{initWA();if(typeof renderPage==='function')renderPage();});
</script><script>
if (window.netlifyIdentity) {
  window.netlifyIdentity.on("init", user => {
    if (!user) {
      window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
    }
  });
}
</script>
