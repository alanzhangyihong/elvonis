backend:
  name: github
  repo: alanzhangyihong/elvonis
  branch: main

media_folder: "images/uploads"
public_folder: "images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Post"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title (ZH)", name: "title_zh", widget: "string" }
      - { label: "Title (EN)", name: "title_en", widget: "string" }
      - { label: "Category (ZH)", name: "cat_zh", widget: "select", options: ["选购指南", "维护技巧", "行业资讯", "客户案例", "产品介绍"] }
      - { label: "Category (EN)", name: "cat_en", widget: "select", options: ["Buying Guide", "Maintenance", "Industry", "Case Study", "Product"] }
      - { label: "Icon (Emoji)", name: "icon", widget: "string", default: "📊" }
      - { label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD" }
      - { label: "Read Time (ZH)", name: "readZh", widget: "string", default: "5分钟" }
      - { label: "Read Time (EN)", name: "readEn", widget: "string", default: "5 min" }
      - { label: "Excerpt (ZH)", name: "excerpt_zh", widget: "text" }
      - { label: "Excerpt (EN)", name: "excerpt_en", widget: "text" }
      - { label: "Body (ZH)", name: "body_zh", widget: "markdown" }
      - { label: "Body (EN)", name: "body_en", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site_config"
        label: "Brand & Contact"
        file: "_data/site_config.json"
        fields:
          - { label: "Brand Name (EN)", name: "brand", widget: "string", default: "ELVONIS" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }

  - name: "about"
    label: "About Page"
    files:
      - name: "about_content"
        label: "About Content"
        file: "_data/about.json"
        fields:
          - { label: "Brand Story (ZH)", name: "story_zh", widget: "markdown" }
          - { label: "Brand Story (EN)", name: "story_en", widget: "markdown" }
          - { label: "Mission (ZH)", name: "mission_zh", widget: "text" }
          - { label: "Mission (EN)", name: "mission_en", widget: "text" }

  - name: "contact_info"
    label: "Contact Info"
    files:
      - name: "contact"
        label: "Contact Details"
        file: "_data/contact.json"
        fields:
          - { label: "WhatsApp Display", name: "wa_display", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Business Hours (ZH)", name: "hours_zh", widget: "string" }
          - { label: "Business Hours (EN)", name: "hours_en", widget: "string" }
