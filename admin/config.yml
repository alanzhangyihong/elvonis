backend:
  name: github
  repo: alanzhangyihong/elvonis
  branch: main
  base_url: https://www.elvonis.com
  auth_endpoint: /admin/auth

media_folder: "images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "Blog Posts / 博客文章"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title (EN)"
        name: "title_en"
        widget: "string"
      - label: "Title (ZH) 中文标题"
        name: "title_zh"
        widget: "string"
      - label: "Category (EN)"
        name: "category_en"
        widget: "select"
        options: ["Expert Guide", "Maintenance", "Industry Trends", "OEM Insights", "Application", "Buying Guide"]
      - label: "Category (ZH) 分类"
        name: "category_zh"
        widget: "select"
        options: ["专家指南", "维护指南", "行业趋势", "代工洞察", "应用案例", "选购指南"]
      - label: "Excerpt (EN) 摘要"
        name: "excerpt_en"
        widget: "text"
      - label: "Excerpt (ZH) 中文摘要"
        name: "excerpt_zh"
        widget: "text"
      - label: "Publish Date 发布日期"
        name: "date"
        widget: "datetime"
      - label: "Featured Article 是否精选"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "Body EN (English Content)"
        name: "body_en"
        widget: "markdown"
      - label: "Body ZH 中文正文"
        name: "body_zh"
        widget: "markdown"
