backend:
  name: github
  repo: YOUR-GITHUB-USERNAME/YOUR-REPO-NAME   # e.g. elvonis/elvonis-website
  branch: main

media_folder: images/blog
public_folder: /images/blog

collections:
  - name: blog
    label: Blog Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title (EN)", name: title_en, widget: string }
      - { label: "Title (ZH)", name: title_zh, widget: string }
      - { label: "Category (EN)", name: cat_en, widget: string, default: "Industry Guide" }
      - { label: "Category (ZH)", name: cat_zh, widget: string, default: "行业指南" }
      - { label: "Publish Date", name: date, widget: datetime }
      - { label: "Read Time (EN)", name: read_time_en, widget: string, default: "5 min read" }
      - { label: "Read Time (ZH)", name: read_time_zh, widget: string, default: "阅读约5分钟" }
      - { label: "Excerpt (EN)", name: excerpt_en, widget: text }
      - { label: "Excerpt (ZH)", name: excerpt_zh, widget: text }
      - { label: "Body (EN)", name: body_en, widget: markdown }
      - { label: "Body (ZH)", name: body_zh, widget: markdown }
      - { label: "Featured Image", name: image, widget: image, required: false }